name = "gade_sdl"
description = "SDL frontend for gade"
version = "0.1.0"

authors = ["ellamosi"]
maintainers = ["ellamosi <ellamosi@users.noreply.github.com>"]
maintainers-logins = ["ellamosi"]
licenses = "GPL-3.0-or-later"
website = "https://github.com/ellamosi/gade-sdl"
tags = ["ada", "gameboy", "emulator", "sdl"]

project-files = ["gade_sdl.gpr"]

[gpr-externals]
mode = ["debug", "release"]
SDL3ADA_MODE = ["debug", "release"]
SDL3ADA_PLATFORM = ["linux", "bsd", "windows", "macosx", "macos_homebrew", "macos_ports"]
GADE_LIBRARY_TYPE = ["relocatable", "static", "static-pic"]

[gpr-set-externals]
mode = "debug"
SDL3ADA_MODE = "debug"
GADE_LIBRARY_TYPE = "static"

[gpr-set-externals.'case(os)']
linux = { SDL3ADA_PLATFORM = "linux" }
windows = { SDL3ADA_PLATFORM = "windows" }

[gpr-set-externals.'case(os)'.macos.'case(distribution)']
homebrew = { SDL3ADA_PLATFORM = "macos_homebrew" }
macports = { SDL3ADA_PLATFORM = "macos_ports" }
'...' = { SDL3ADA_PLATFORM = "macosx" }

[environment."case(os)".macos]
C_INCLUDE_PATH.prepend = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include"
CPLUS_INCLUDE_PATH.prepend = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include"
LIBRARY_PATH.prepend = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/lib"

[[depends-on]]
sdl3ada = "*"

[[depends-on]]
sdl3ada_menu = "*"

[[depends-on]]
gade = "^0.1.0"
# For local sibling development, pin temporarily:
#   alr pin gade --use=../gade
# To return to the published crate:
#   alr pin gade --unpin

[[pins]]
gade = { path='../gade' }

[[pins]]
sdl3ada = { path='../sdl3ada' }

[[pins]]
sdl3ada_menu = { path='../sdl3ada_menu' }
